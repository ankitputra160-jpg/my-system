*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;background:#f0f0f0}
.top-bar{background:#1a3a5c;color:#fff;font-size:13px;padding:6px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.top-bar a{color:#ffd700;text-decoration:none;margin:0 10px 0 0;font-size:12px}
.top-bar .right-links a{color:#fff;margin:0 0 0 12px;font-size:12px}
.header{background:linear-gradient(135deg,#0b3d6b 0%,#1a5a8c 50%,#0b3d6b 100%);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;border-bottom:3px solid #ffd700}
.header .logo{height:85px}
.header .logo2{height:70px}
.header .title{text-align:center}
.header .title h1{font-size:26px;font-weight:bold;text-shadow:1px 1px 2px rgba(0,0,0,0.3)}
.header .title h2{font-size:17px;font-weight:normal;margin-top:4px;color:#ffd700}
.header .title .naac{font-size:13px;color:#aaddff;margin-top:2px}
.navbar{background:#1a3a5c;display:flex;flex-wrap:wrap;justify-content:center;border-bottom:2px solid #ffd700}
.navbar a{color:#fff;text-decoration:none;padding:10px 18px;font-size:14px;transition:background 0.2s}
.navbar a:hover{background:#ffd700;color:#1a3a5c}
.slider-container{position:relative;width:100%;max-width:1200px;margin:0 auto;overflow:hidden;background:#000}
.slider{display:flex;transition:transform 1s ease-in-out}
.slider img{width:100%;flex-shrink:0;display:block;height:auto;max-height:450px;object-fit:cover}
.announcement{background:#fff;border-bottom:2px solid #1a3a5c;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;font-size:14px}
.announcement .label{background:#ffd700;color:#1a3a5c;font-weight:bold;padding:4px 14px;border-radius:3px;font-size:13px}
.announcement span{flex:1;color:#c00;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
@keyframes scrollText{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.announcement .scrolling-text{display:inline-block;animation:scrollText 15s linear infinite;white-space:nowrap}
.main-content{max-width:1200px;margin:20px auto;padding:0 15px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#fff;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,0.1);overflow:hidden}
.card-header{background:#1a3a5c;color:#fff;padding:10px 16px;font-size:15px;font-weight:bold}
.card-body{padding:14px 16px;font-size:14px;line-height:1.7;color:#333}
.card-body ul{list-style:none;padding:0}
.card-body ul li{border-bottom:1px solid #eee;padding:6px 0}
.card-body ul li a{color:#1a5a8c;text-decoration:none}
.card-body ul li a:hover{text-decoration:underline}
.card-body ul li::before{content:"\25B8 ";color:#ffd700;font-weight:bold}
.vc-section{max-width:1200px;margin:20px auto;padding:0 15px}
.vc-card{background:#fff;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,0.1);overflow:hidden}
.vc-card .card-body{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.vc-card .card-body img{width:130px;border-radius:6px;border:2px solid #1a3a5c}
.vc-card .card-body p{flex:1;min-width:200px}
